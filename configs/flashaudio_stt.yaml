# FlashAudio — Whisper Speech-to-Text Fine-Tuning
# Usage: flashaudio train --config configs/flashaudio_stt.yaml

model:
  model_id: "openai/whisper-base"
  task: "stt"
  torch_dtype: "float32"
  max_length: 448

data:
  dataset_path: "data/librispeech"
  dataset_name: "librispeech"
  sample_rate: 16000
  max_duration: 30.0
  val_split: 0.1
  num_workers: 4

train:
  epochs: 10
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/stt_whisper"
  save_steps: 500
  eval_steps: 250
  logging_steps: 10
  amp: true
  gradient_checkpointing: true

audio:
  sample_rate: 16000
  n_fft: 1024
  hop_length: 256
  n_mels: 80
