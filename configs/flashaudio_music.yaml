# FlashAudio — Music/Audio Generation Training
# Usage: flashaudio train --config configs/flashaudio_music.yaml

model:
  model_id: "audio_diffusion"
  task: "generation"
  torch_dtype: "float32"

data:
  dataset_path: "data/music"
  dataset_name: "custom"
  sample_rate: 22050
  max_duration: 10.0
  val_split: 0.1
  num_workers: 4

train:
  epochs: 200
  batch_size: 8
  learning_rate: 2.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.01
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/music_gen"
  save_steps: 2000
  eval_steps: 1000
  logging_steps: 100
  amp: true
  gradient_checkpointing: false

audio:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  n_mels: 80
