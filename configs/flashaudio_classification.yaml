# FlashAudio — Audio Classification Training
# Usage: flashaudio train --config configs/flashaudio_classification.yaml

model:
  model_id: "audio_classifier"
  task: "classification"
  torch_dtype: "float32"
  num_labels: 527

data:
  dataset_path: "data/audioset"
  dataset_name: "audioset"
  sample_rate: 16000
  max_duration: 10.0
  val_split: 0.2
  num_workers: 4

train:
  epochs: 50
  batch_size: 32
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  warmup_ratio: 0.05
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/audio_cls"
  save_steps: 500
  eval_steps: 250
  logging_steps: 20
  amp: true
  gradient_checkpointing: false

audio:
  sample_rate: 16000
  n_fft: 1024
  hop_length: 256
  n_mels: 80
