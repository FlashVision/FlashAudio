# FlashAudio — Text-to-Speech Training
# Usage: flashaudio train --config configs/flashaudio_tts.yaml

model:
  model_id: "tts_tacotron2"
  task: "tts"
  torch_dtype: "float32"

data:
  dataset_path: "data/ljspeech"
  dataset_name: "ljspeech"
  sample_rate: 22050
  max_duration: 15.0
  val_split: 0.1
  num_workers: 4

train:
  epochs: 100
  batch_size: 16
  learning_rate: 1.0e-3
  weight_decay: 1.0e-6
  warmup_ratio: 0.05
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  save_dir: "workspace/tts_tacotron2"
  save_steps: 1000
  eval_steps: 500
  logging_steps: 50
  amp: true
  gradient_checkpointing: false

audio:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  n_mels: 80
  win_length: 1024
  fmin: 0.0
  fmax: 8000.0
